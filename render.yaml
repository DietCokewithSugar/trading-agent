# Render Blueprint — 在 Render 控制台选择 "New +" → "Blueprint",关联本仓库即可。
# 文档: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: news-trading-agent
    runtime: node
    plan: starter # 注意:free 计划会休眠,定时抓取/交易会停摆,建议 starter 及以上
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: FMP_API_KEY
        sync: false # 在 Render 控制台填写
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: DEEPSEEK_COST_PER_1M_INPUT
        value: "0.56"
      - key: DEEPSEEK_COST_PER_1M_OUTPUT
        value: "1.68"
      - key: NEWS_POLL_SECONDS
        value: "20"
      - key: QUOTE_PUSH_SECONDS
        value: "5"
      - key: SNAPSHOT_SECONDS
        value: "60"
      - key: RISK_CHECK_SECONDS
        value: "30"
      - key: MAX_ANALYZE_PER_CYCLE
        value: "8"
      - key: INITIAL_CAPITAL
        value: "100000"
      - key: TRADE_TIER_THRESHOLD
        value: "2"
      - key: MIN_FINAL_CONFIDENCE
        value: "0.35"
      - key: ENABLE_REFLECTION
        value: "true"
      - key: ENABLE_TRAILING_STOP
        value: "true"
      - key: ENABLE_POSITION_REVIEW
        value: "true"
      - key: POSITION_REVIEW_HOUR
        value: "14"
      - key: ENABLE_RISK_OFFICER
        value: "true"
      - key: ENABLE_SLIPPAGE
        value: "true"
      - key: SLIPPAGE_MAX_BPS
        value: "150"
      - key: COMMISSION_BPS
        value: "0"
      - key: BUY_PRICE_DRIFT_ABORT_PERCENT
        value: "5"
      - key: MIN_MARKET_CAP
        value: "300000000"
      - key: MIN_PRICE
        value: "2"
      - key: MIN_AVG_DOLLAR_VOLUME
        value: "5000000"
      - key: ALLOWED_EXCHANGES
        value: "NASDAQ,NYSE,AMEX"
      - key: DAILY_LOSS_HALT_PERCENT
        value: "2"
      - key: MAX_OPEN_POSITIONS
        value: "10"
      - key: MAX_SECTOR_FRACTION
        value: "0.35"
      - key: LOSS_STREAK_COUNT
        value: "3"
      - key: LOSS_STREAK_SCALE
        value: "0.5"
      - key: PRESS_BULLISH_PENALTY
        value: "0.75"
      - key: PENDING_ORDER_MAX_AGE_HOURS
        value: "96"
      - key: ENABLE_MACRO
        value: "true"
      - key: CALENDAR_POLL_MINUTES
        value: "60"
      - key: MACRO_EVENT_VALIDITY_HOURS
        value: "72"
      - key: MACRO_SHOCK_HOURS
        value: "6"
      - key: BLACKOUT_BEFORE_MINUTES
        value: "30"
      - key: BLACKOUT_AFTER_MINUTES
        value: "30"
      - key: ALLOCATION_INTERVAL_MINUTES
        value: "15"
      - key: MAX_ALLOCATIONS_PER_RUN
        value: "3"
      - key: CANDIDATE_MAX_AGE_HOURS
        value: "24"
      - key: MAX_NEW_POSITIONS_PER_DAY
        value: "3"
      - key: CONFLICT_WINDOW_MINUTES
        value: "120"
      - key: WATCHLIST
        value: "AAPL,MSFT,NVDA,AMZN,GOOGL,META,TSLA"
      - key: ADMIN_TOKEN
        sync: false # 管理后台(#/admin)登录口令,在 Render 控制台填写
